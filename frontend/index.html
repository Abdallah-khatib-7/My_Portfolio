<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Abdallah Khatib — Full-Stack Developer building complete, production-grade systems from schema to deployment." />
    <title>Abdallah Khatib — Full-Stack Developer</title>

    <!-- Social share metadata. og:url / og:image should become absolute URLs
         once the production domain is set (scrapers don't resolve relative
         paths), and the profile photo is a placeholder for a designed share
         image. The photo is served from public/profile-picture.jpg — the copy
         in src/assets/ gets a hashed filename at build time. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Abdallah Khatib — Full-Stack Developer" />
    <meta property="og:description" content="Full-Stack Developer building complete, production-grade systems from schema to deployment." />
    <meta property="og:image" content="/profile-picture.jpg" />
    <meta property="og:url" content="/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Abdallah Khatib — Full-Stack Developer" />
    <meta name="twitter:description" content="Full-Stack Developer building complete, production-grade systems from schema to deployment." />
    <meta name="twitter:image" content="/profile-picture.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-bg text-fg font-sans overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
